nav {
  background-color: white;
  z-index: 1;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 40px;
  border-top: 0.5px solid black;
  border-bottom: 0.5px solid black;
}

nav a {
  margin-top: 2.4%;
  display: inline-block;
  text-align: center;
  padding: 0% 3%;
  font-size: 15px;
  color: black;
  text-decoration: none;
  border-left: 0.5px solid black;
}
nav a:nth-of-type(2) {
  border-left: none;
}

nav a:hover {
  color: black;
  text-shadow: 1px 1px 0 white, 2px 2px 0 #8254EB;
  transition: .1s;
}
nav a:nth-of-type(1) {
  margin-top: 0;
  font-size: 0;
  font-style: italic;
  border-left: 0;
  top: 5%;
  left: 10px;
  color: black;
  text-shadow: 1px 1px 0 rgb(0, 0, 0);
  -webkit-text-fill-color: white; /* Will override color (regardless of order) */
  -webkit-text-stroke-width: 0.5px;
  -webkit-text-stroke-color: black;
  position: absolute;
  padding: 0;
}
nav a:nth-of-type(1):hover {
  color: #8254EB;
  text-shadow: 1px 1px 0 black, 2px 2px 0 #8254EB, 3px 3px 0 white, 4px 4px 0 black;
  transition: .1s;
}
@media only screen and (max-height: 550px) {
  nav {
    position: absolute;
  }
}
@media only screen and (min-width: 500px) and (max-width: 900px) {
    nav a:nth-of-type(1) {
    font-size: 0;
  }
  nav a{ 
    margin-top: 1%;
  }
}

    font-size: 20px;
  }
}

  }
}

  nav a{ 
    margin-top: 1.7%;
  }

      top: 14%;
    font-size: 30px;
  }
}
